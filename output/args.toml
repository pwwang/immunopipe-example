# | Arguments for process: ScrnaMetabolicLandscape/MetabolicFeatures           |
# +----------------------------------------------------------------------------+
[MetabolicFeatures]
# (process level) Whether enable caching for processes [default: True]
## cache = None

# (process level) How we should deal with job errors.
## error_strategy = None

# (process level) How many times to retry the job when failed
## num_retries = None

# (process level) The scheduler to run the jobs
## scheduler = None

# (process level) How many jobs to run simultaneously by the scheduler
## forks = None

# (process level) Whether to flatten the output from jobs of the process (without creating subdirectories with job indexes).
## output_flatten = None

# (process level) Plugin options. Will update to the default.
[MetabolicFeatures.plugin_opts]
poplog_pattern = "^(?P<level>INFO|WARN|WARNING|CRITICAL|ERROR|DEBUG?)\\s*\\[\\d+-\\d+-\\d+ \\d+:\\d+:\\d+\\] (?P<message>.*)$"
report = "file://../reports/scrna_metabolic_landscape/MetabolicFeatures.svelte"

# (process level) The default scheduler options. Will update to the default one
[MetabolicFeatures.scheduler_opts]

# Environment variables for the process
[MetabolicFeatures.envs]
# Number of cores to use for parallelization for the comparisons for each subset and group.
# Defaults to `ScrnaMetabolicLandscape.ncores`.
ncores = 1

# Method to use for gene preranking.
# Signal to noise: the larger the differences of the means (scaled by the standard deviations); that is, the more distinct the gene expression is in each phenotype and the more the gene acts as a “class marker.”.
# Absolute signal to noise: the absolute value of the signal to noise.
# T test: Uses the difference of means scaled by the standard deviation and number of samples.
# Ratio of classes: Uses the ratio of class means to calculate fold change for natural scale data.
# Diff of classes: Uses the difference of class means to calculate fold change for nature scale data Log2 ratio of classes: Uses the log2 ratio of class means to calculate fold change for natural scale data. This is the recommended statistic for calculating fold change for log scale data.
prerank_method = "signal_to_noise"

# The GMT file with the metabolic pathways.
# Defaults to `ScrnaMetabolicLandscape.gmtfile`
gmtfile = "data/KEGG_metabolism.short.gmt"

# Subset the data by the given column in the metadata. For example, `Response`.
# `NA` values will be removed in this column.
# Defaults to `ScrnaMetabolicLandscape.subset_by` If None, the data will not be subsetted.
# Multiple columns can be provided as a list, which is helpful when subsets have overlapping cells.
subset_by = "Diagnosis"

# Group the data by the given column in the metadata. For example, `cluster`.
# Defaults to `ScrnaMetabolicLandscape.group_by`
group_by = "seurat_clusters"

# The comparison groups to use for the analysis.
# If not provided, each group in the `group_by` column will be used to compare with the other groups.
# If a single group is provided as an element, it will be used to compare with all the other groups.
# For example, if we have `group_by = "cluster"` and we have `1`, `2` and `3` in the `group_by` column, we could have `comparisons = ["1", "2"]`, which will compare the group `1` with groups `2` and `3`, and the group `2` with groups `1` and `3`. We could also have `comparisons = ["1:2", "1:3"]`, which will compare the group `1` with group `2` and group `1` with group `3`.
comparisons = []

# The plots to generate.
# Names will be used as the title for the plot. Values will be the arguments passed to `biopipen.utils::VizGSEA()` function.
# See <https://pwwang.github.io/biopipen.utils.R/reference/VizGSEA.html>.
# A key `level` is supported to specify the level of the plot.
# Possible values are `case`, which includes all subsets and groups in the case; `subset`, which includes all groups in the subset; otherwise, it will plot for the groups.
# For `case`/`subset` level plots, current `plot_type` only "dot" is supported for now, then the values will be passed to `plotthis::DotPlot()`
[MetabolicFeatures.envs.plots."Summary Plots of all clusters"]
level = "case"

[MetabolicFeatures.envs.plots."Summary Plots of all comparisons"]
level = "subset"

# Other arguments for the `fgsea::fgsea()` function.
# For example, `{"minSize": 15, "maxSize": 500}`.
# See <https://rdrr.io/bioc/fgsea/man/fgsea.html> for more details.
[MetabolicFeatures.envs.fgsea_args]

# Multiple cases for the analysis.
# If you only have one case, you can specify the parameters directly to `envs.prerank_method`, `envs.subset_by`, `envs.group_by`, `envs.comparisons`, `envs.fgsea_args` and `envs.plots`.
# The name of this default case will be `envs.subset_by`.
# If you have multiple cases, you can specify the parameters for each case in a dictionary. The keys will be the names of the cases and the values will be dictionaries with the parameters for each case, where the values will be inherited from `envs.prerank_method`, `envs.subset_by`, `envs.group_by`, `envs.comparisons`, `envs.fgsea_args` and `envs.plots`.
[MetabolicFeatures.envs.cases]

# +----------------------------------------------------------------------------+
# | Arguments for process: ScrnaMetabolicLandscape/MetabolicPathwayHeterogeneity |
# +----------------------------------------------------------------------------+
[MetabolicPathwayHeterogeneity]
# (process level) Whether enable caching for processes [default: True]
## cache = None

# (process level) How we should deal with job errors.
## error_strategy = None

# (process level) How many times to retry the job when failed
## num_retries = None

# (process level) The scheduler to run the jobs
## scheduler = None

# (process level) How many jobs to run simultaneously by the scheduler
## forks = None

# (process level) Whether to flatten the output from jobs of the process (without creating subdirectories with job indexes).
## output_flatten = None

# (process level) Plugin options. Will update to the default.
[MetabolicPathwayHeterogeneity.plugin_opts]
poplog_pattern = "^(?P<level>INFO|WARN|WARNING|CRITICAL|ERROR|DEBUG?)\\s*\\[\\d+-\\d+-\\d+ \\d+:\\d+:\\d+\\] (?P<message>.*)$"
report = "file://../reports/scrna_metabolic_landscape/MetabolicPathwayHeterogeneity.svelte"

# (process level) The default scheduler options. Will update to the default one
[MetabolicPathwayHeterogeneity.scheduler_opts]

# Environment variables for the process
[MetabolicPathwayHeterogeneity.envs]
# The GMT file with the metabolic pathways.
# Defaults to `ScrnaMetabolicLandscape.gmtfile`
gmtfile = "data/KEGG_metabolism.short.gmt"

# Select the PCs to use for the analysis.
select_pcs = 0.8

# The p-value cutoff to select the enriched pathways
pathway_pval_cutoff = 0.01

# Number of cores to use for parallelization Defaults to `ScrnaMetabolicLandscape.ncores`
ncores = 1

# Subset the data by the given column in the metadata. For example, `Response`.
# `NA` values will be removed in this column.
# Defaults to `ScrnaMetabolicLandscape.subset_by` If None, the data will not be subsetted.
# Multiple columns can be provided as a list, which is helpful when subsets have overlapping cells.
subset_by = "Diagnosis"

# Group the data by the given column in the metadata. For example, `cluster`.
# Defaults to `ScrnaMetabolicLandscape.group_by`
group_by = "seurat_clusters"

# Other arguments for the `fgsea::fgsea()` function.
# For example, `{"minSize": 15, "maxSize": 500}`.
# See <https://rdrr.io/bioc/fgsea/man/fgsea.html> for more details.
[MetabolicPathwayHeterogeneity.envs.fgsea_args]
scoreType = "std"
nproc = 1

# The plots to generate.
# Names will be used as the title for the plot. Values will be the arguments passed to `biopipen.utils::VizGSEA()` function.
# See <https://pwwang.github.io/biopipen.utils.R/reference/VizGSEA.html>.
[MetabolicPathwayHeterogeneity.envs.plots."Pathway Heterogeneity"]
plot_type = "dot"

[MetabolicPathwayHeterogeneity.envs.plots."Pathway Heterogeneity".devpars]
res = 100

# Multiple cases for the analysis.
# If you only have one case, you can specify the parameters directly to `envs.subset_by`, `envs.group_by`, `envs.fgsea_args`, `envs.plots`, `envs.select_pcs`, and `envs.pathway_pval_cutoff`.
# The name of this default case will be `envs.subset_by`.
# If you have multiple cases, you can specify the parameters for each case in a dictionary. The keys will be the names of the cases and the values will be dictionaries with the parameters for each case, where the values will be inherited from `envs.subset_by`, `envs.group_by`, `envs.fgsea_args`, `envs.plots`, `envs.select_pcs`, and `envs.pathway_pval_cutoff`.
[MetabolicPathwayHeterogeneity.envs.cases]

