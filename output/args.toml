# Check examples at <https://github.com/IanevskiAleksandr/sc-type/blob/master/ScTypeDB_full.xlsx>
## sctype_db = None

# The column name in metadata to use as the clusters.
# If not specified, the identity column will be used when input is rds/qs/qs2 (supposing we have a Seurat object).
# If input data is h5ad, this is required to run cluster-based annotation tools.
# For `celltypist`, this is a shortcut to set `over_clustering` in `celltypist_args`.
## ident = None

# The backup column name to store the original identities.
# If not specified, the original identity column will not be stored.
# If `envs.newcol` is specified, this will be ignored.
backup_col = "seurat_clusters_id"

# The tissue to use for `hitype`.
# Avaiable tissues should be the first column (`tissueType`) of `hitype_db`.
# If not specified, all rows in `hitype_db` will be used.
## hitype_tissue = None

# The database to use for hitype.
# Compatible with `sctype_db`.
# See also <https://pwwang.github.io/hitype/articles/prepare-gene-sets.html> You can also use built-in databases, including `hitypedb_short`, `hitypedb_full`, and `hitypedb_pbmc3k`.
## hitype_db = None

# The cell types to use for direct annotation.
# If given as a list (array), you can use `"-"` or `""` as the placeholder for the clusters that you want to keep the original cell types. If the length of `cell_types` is shorter than the number of clusters, the remaining clusters will be kept as the original cell types.
# You can also use `NA` to remove the clusters from downstream analysis. This only works when `envs.newcol` is not specified.
# If given as a dict (map), the keys are the original cluster names and the values are the new cell types.
#  /// Note If `tool` is `direct` and `cell_types` is not specified or an empty list, the original cell types will be kept and nothing will be changed.
# /// 
cell_types = []

# The additional cell type annotations to add to the metadata.
# The keys are the new column names and the values are the cell types lists.
# The cell type lists work the same as `cell_types` above.
# This is useful when you want to keep multiple annotations of cell types.
## more_cell_types = None

# The output file type. Currently only works for `celltypist`.
# An RDS file will be generated for other tools.
outtype = "input"

# The arguments for `celltypist::celltypist()` if `tool` is `celltypist`.
[CellTypeAnnotation.envs.celltypist_args]
# The path to model file.
model = "data/Immune_All_Low.pkl"

# The python path where celltypist is installed.
python = "python"

# When true, it refines cell identities within local subclusters after an over-clustering approach at the cost of increased runtime.
majority_voting = true

# The column name in metadata to use as clusters for majority voting.
# Set to `False` to disable over-clustering.
# When `in.sobjfile` is rds/qs/qs2 (supposing we have a Seurat object), the default ident is used by default.
# Otherwise, it is False by default.
## over_clustering = None

# When converting a Seurat object to AnnData, the assay to use.
# If input is h5seurat, this defaults to RNA.
# If input is Seurat object in RDS, this defaults to the default assay.
## assay = None

# The arguments for `scCATCH::findmarkergene()` if `tool` is `sccatch`.
[CellTypeAnnotation.envs.sccatch_args]
# The specie of cells.
## species = None

# If the sample is from cancer tissue, then the cancer type may be defined.
cancer = "Normal"

# Tissue origin of cells must be defined.
## tissue = None

# The marker genes for cell type identification.
## marker = None

# Whether to use custom marker genes. If `True`, no `species`, `cancer`, and `tissue` are needed.
if_use_custom_marker = false

# +----------------------------------------------------------------------------+
# | Arguments for process: SeuratMap2Ref                                       |
# +----------------------------------------------------------------------------+
[SeuratMap2Ref]
# (process level) Whether enable caching for processes [default: True]
## cache = None

# (process level) How we should deal with job errors.
## error_strategy = None

# (process level) How many times to retry the job when failed
## num_retries = None

# (process level) The scheduler to run the jobs
## scheduler = None

# (process level) How many jobs to run simultaneously by the scheduler
## forks = None

# (process level) Whether to flatten the output from jobs of the process (without creating subdirectories with job indexes).
## output_flatten = None

# (process level) Plugin options. Will update to the default.
[SeuratMap2Ref.plugin_opts]
poplog_pattern = "^(?P<level>INFO|WARN|WARNING|CRITICAL|ERROR|DEBUG?)\\s*\\[\\d+-\\d+-\\d+ \\d+:\\d+:\\d+\\] (?P<message>.*)$"
report = "file://../reports/common.svelte"

# (process level) The default scheduler options. Will update to the default one
[SeuratMap2Ref.scheduler_opts]

# Environment variables for the process
[SeuratMap2Ref.envs]
# Number of cores to use.
# When `split_by` is used, this will be the number of cores for each object to map to the reference.
# When `split_by` is not used, this is used in `future::plan(strategy = "multicore", workers = <ncores>)` to parallelize some Seurat procedures.
# See also: <https://satijalab.org/seurat/archive/v3.0/future_vignette.html>
ncores = 8

# The reference seurat object file.
# Either an RDS file or a h5seurat file that can be loaded by `Seurat::LoadH5Seurat()`.
# The file type is determined by the extension. `.rds` or `.RDS` for RDS file, `.h5seurat` or `.h5` for h5seurat file.
ref = "prepared-data/pbmc_multimodal_2023.rds"

# A column name of metadata from the reference (e.g. `celltype.l1`, `celltype.l2`) to transfer to the query as the cell types (ident) for downstream analysis. This field is required.
# If you want to transfer multiple columns, you can use `envs.MapQuery.refdata`.
use = "celltype.l2"

# The name of the ident for query transferred from `envs.use` of the reference.
ident = "seurat_ref_annotations"

# Normalization method the reference used. The same method will be used for the query.
refnorm = "auto"

# The column name in metadata to split the query into multiple objects.
# This helps when the original query is too large to process.
## split_by = None

# Skip normalization if the query is already normalized.
# Since the object is supposed to be generated by `SeuratPreparing`, it is already normalized.
# However, a different normalization method may be used.
# If the reference is normalized by the same method as the query, the normalization can be skipped.
# Otherwise, the normalization cannot be skipped.
# The normalization method used for the query set is determined by the default assay.
# If `SCT`, then `SCTransform` is used; otherwise, `NormalizeData` is used.
# You can set this to `False` to force re-normalization (with or without the arguments previously used).
skip_if_normalized = true

# Whether to cache the information at different steps.
# If `True`, the seurat object will be cached in the job output directory, which will be not cleaned up when job is rerunning.
# The cached seurat object will be saved as `<signature>.<kind>.RDS` file, where `<signature>` is the signature determined by the input and envs of the process.
# See <https://github.com/satijalab/seurat/issues/7849>, <https://github.com/satijalab/seurat/issues/5358> and <https://github.com/satijalab/seurat/issues/6748> for more details also about reproducibility issues.
# To not use the cached seurat object, you can either set `cache` to `False` or delete the cached file at `<signature>.RDS` in the cache directory.
cache = "/tmp"

# The mutaters to mutate the metadata.
# This is helpful when we want to create new columns for `split_by`.
[SeuratMap2Ref.envs.mutaters]

# The plots to generate.
# The keys are the names of the plots and the values are the arguments for the plot.
# The arguments will be passed to `biopipen.utils::VizSeuratMap2Ref()` to generate the plots.
# The plots will be saved to the output directory.
# See <https://pwwang.github.io/biopipen.utils.R/reference/VizSeuratMap2Ref.html>.
[SeuratMap2Ref.envs.plots."Mapped Identity"]
features = "{ident}:{use}"

[SeuratMap2Ref.envs.plots."Mapping Score"]
features = "{ident}.score"

# Arguments for [`MapQuery()`](https://satijalab.org/seurat/reference/mapquery)
[SeuratMap2Ref.envs.MapQuery]
reduction-model = "wnn.umap"

# Extra data to transfer from the reference to the query.
[SeuratMap2Ref.envs.MapQuery.refdata]

# Arguments for [`SCTransform()`](https://satijalab.org/seurat/reference/sctransform)
[SeuratMap2Ref.envs.SCTransform]
# Place corrected UMI matrix in assay counts layer?
do-correct-umi = false

# Whether to scale residuals to have unit variance?
do-scale = false

# Whether to center residuals to have mean zero?
do-center = true

# Arguments for [`NormalizeData()`](https://satijalab.org/seurat/reference/normalizedata)
[SeuratMap2Ref.envs.NormalizeData]
# Normalization method.
normalization-method = "LogNormalize"

# Arguments for [`FindTransferAnchors()`](https://satijalab.org/seurat/reference/findtransferanchors)
[SeuratMap2Ref.envs.FindTransferAnchors]
